<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>ЭГИДА ТРАНС — Водитель</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
  background:#07090f;color:#e5edf8;min-height:100vh;
  overscroll-behavior:none;
}
.screen{display:none;min-height:100vh;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.screen.active{display:flex}

/* ── Экран PIN ── */
.pin-box{width:100%;max-width:360px;background:#0b0f1a;border:1px solid #172033;border-radius:20px;padding:28px 24px}
.logo{font-size:22px;font-weight:900;color:#f0f6ff;letter-spacing:.5px;margin-bottom:4px}
.sub{font-size:12px;color:#334155;margin-bottom:24px}
.pin-display{
  background:#07090f;border:2px solid #1e3060;border-radius:14px;
  padding:18px;text-align:center;margin-bottom:16px;
  font-size:40px;font-weight:900;letter-spacing:14px;color:#60a5fa;
  min-height:76px;display:flex;align-items:center;justify-content:center;
}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.num-btn{
  background:#0f1a2e;border:1px solid #1e3060;border-radius:14px;
  padding:18px 10px;font-size:22px;font-weight:700;color:#dce4f0;
  cursor:pointer;text-align:center;user-select:none;transition:background .1s,transform .08s;
  -webkit-user-select:none;
}
.num-btn:active{background:#172044;transform:scale(.94)}
.num-btn.del{color:#ef4444;font-size:18px}
.num-btn.ok{background:#172044;color:#60a5fa;font-size:15px;font-weight:800}
.pin-err{min-height:18px;color:#ef4444;font-size:12px;text-align:center;margin-bottom:10px}
.enter-btn{
  width:100%;padding:15px;background:#1e3a8a;border:none;border-radius:14px;
  color:#fff;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;
  transition:background .15s;
}
.enter-btn:active{background:#1e40af}

/* ── Экран кнопок ── */
.driver-wrap{width:100%;max-width:400px}
.driver-header{
  background:#0b0f1a;border:1px solid #172033;border-radius:16px;
  padding:16px 20px;margin-bottom:16px;text-align:center;
}
.truck-plate{font-size:18px;font-weight:900;color:#f0f6ff;letter-spacing:.5px}
.truck-driver{font-size:13px;color:#475569;margin-top:4px}
.truck-hired{font-size:11px;color:#f59e0b;font-weight:700;margin-top:3px}

/* Блок текущего статуса */
.cur-status{
  border-radius:12px;padding:10px 14px;margin-bottom:14px;
  display:flex;align-items:center;gap:10px;
}
.cur-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.cur-label{font-size:13px;font-weight:700}
.cur-time{font-size:10px;color:#475569;margin-top:2px}

/* Кнопки статусов */
.btn-group{margin-bottom:10px}
.group-title{font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:#334155;margin-bottom:6px;padding-left:4px}
.status-btn{
  width:100%;padding:15px 18px;margin-bottom:7px;border-radius:14px;
  border:none;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;
  text-align:left;display:flex;align-items:center;gap:12px;
  transition:opacity .15s, transform .08s;
  -webkit-user-select:none;user-select:none;
}
.status-btn:active{opacity:.85;transform:scale(.985)}
.status-btn .btn-icon{font-size:20px;flex-shrink:0;width:28px;text-align:center}
.status-btn .btn-text{flex:1;line-height:1.2}
.status-btn .btn-sub{font-size:11px;opacity:.7;font-weight:500;display:block;margin-top:2px}

/* Поле комментария */
.comment-wrap{margin-bottom:12px}
.comment-label{font-size:10px;font-weight:700;color:#334155;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px}
.comment-input{
  width:100%;background:#0b0f1a;border:1px solid #1e3060;border-radius:12px;
  padding:11px 14px;color:#dce4f0;font-size:14px;font-family:inherit;
  resize:none;height:72px;
}

/* Успех */
.success-box{
  background:#0a1a0a;border:2px solid #22c55e;border-radius:16px;
  padding:24px;text-align:center;margin-bottom:16px;
}
.success-icon{font-size:48px;margin-bottom:10px}
.success-title{font-size:18px;font-weight:800;color:#22c55e;margin-bottom:6px}
.success-label{font-size:14px;color:#94a3b8}
.success-time{font-size:11px;color:#334155;margin-top:8px}
.again-btn{
  width:100%;padding:14px;background:#172044;border:1px solid #1e3060;border-radius:14px;
  color:#60a5fa;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;
  margin-bottom:8px;
}
.logout-btn{
  width:100%;padding:10px;background:transparent;border:1px solid #1a2540;border-radius:12px;
  color:#334155;font-size:12px;cursor:pointer;font-family:inherit;
}

/* История отметок */
.history{margin-top:14px;background:#0b0f1a;border:1px solid #141c2e;border-radius:14px;padding:12px 14px}
.history-title{font-size:10px;font-weight:700;color:#334155;letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px}
.history-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #0f1828}
.history-item:last-child{border-bottom:none}
.history-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.history-label{font-size:12px;color:#94a3b8;flex:1}
.history-time{font-size:10px;color:#334155;white-space:nowrap}

/* Загрузка */
.loading{color:#334155;font-size:14px;text-align:center;padding:40px}
.spinner{display:inline-block;width:24px;height:24px;border:2px solid #1e3060;border-top-color:#3b82f6;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- ── Экран PIN ── -->
<div id="screen-pin" class="screen active">
  <div class="pin-box">
    <div class="logo">ЭГИДА ТРАНС</div>
    <div class="sub">Введите ваш код водителя</div>
    <div class="pin-display" id="pin-display">·  ·  ·  ·</div>
    <div class="pin-err" id="pin-err"></div>
    <div class="numpad" id="numpad"></div>
    <button class="enter-btn" id="enter-btn" onclick="tryPin()">Войти</button>
  </div>
</div>

<!-- ── Экран кнопок ── -->
<div id="screen-driver" class="screen">
  <div class="driver-wrap">
    <div class="driver-header">
      <div class="truck-plate" id="d-plate">—</div>
      <div id="d-hired" style="display:none" class="truck-hired"></div>
      <div class="truck-driver" id="d-driver">—</div>
    </div>

    <!-- Текущий статус -->
    <div id="cur-status-block" class="cur-status" style="background:#0a1020;border:1px solid #1e3060">
      <div class="cur-dot" id="cur-dot" style="background:#334155"></div>
      <div>
        <div class="cur-label" id="cur-label">Нет отметки</div>
        <div class="cur-time" id="cur-time"></div>
      </div>
    </div>

    <!-- Кнопки -->
    <div id="btn-area"></div>

    <!-- Комментарий -->
    <div class="comment-wrap">
      <div class="comment-label">Комментарий (необязательно)</div>
      <textarea id="comment-input" class="comment-input" placeholder="Опишите ситуацию, укажите адрес..."></textarea>
    </div>

    <!-- История -->
    <div class="history" id="history-block" style="display:none">
      <div class="history-title">История отметок сегодня</div>
      <div id="history-list"></div>
    </div>
  </div>
</div>

<!-- ── Экран успеха ── -->
<div id="screen-success" class="screen">
  <div class="driver-wrap">
    <div class="success-box">
      <div class="success-icon" id="s-icon">✅</div>
      <div class="success-title">Статус отправлен!</div>
      <div class="success-label" id="s-label">—</div>
      <div class="success-time" id="s-time"></div>
    </div>
    <div id="d-plate2" style="text-align:center;font-size:13px;color:#334155;margin-bottom:12px"></div>
    <button class="again-btn" onclick="showDriver()">Отметить ещё</button>
    <button class="logout-btn" onclick="logout()">Сменить водителя</button>

    <!-- История на экране успеха -->
    <div class="history" id="history-block2" style="display:none;margin-top:14px">
      <div class="history-title">История отметок сегодня</div>
      <div id="history-list2"></div>
    </div>
  </div>
</div>

<script>
// ── Firebase ──────────────────────────────────────────────────────────────────
var DB = "https://egida-trans-default-rtdb.europe-west1.firebasedatabase.app";

function dbGet(path) {
  return fetch(DB + path + ".json?t=" + Date.now())
    .then(function(r) { return r.json(); })
    .catch(function() { return null; });
}
function dbPatch(path, data) {
  return fetch(DB + path + ".json", {
    method: "PATCH",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(data)
  }).catch(function() {});
}
function dbPut(path, data) {
  return fetch(DB + path + ".json", {
    method: "PUT",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(data)
  }).catch(function() {});
}

// ── Кнопки водителя (полный список) ──────────────────────────────────────────
var BTNS = [
  // Загрузка
  {key:"departing_load",  label:"Выехал на загрузку",      sub:"Выехал в сторону места загрузки", icon:"🚛", color:"#f59e0b", bg:"#1a1200", border:"#f59e0b", status:"FORWARD",    group:"load"},
  {key:"at_load",         label:"Приехал на загрузку",      sub:"На месте, жду загрузку",           icon:"📍", color:"#f59e0b", bg:"#1a1200", border:"#f59e0b", status:"AT_LOAD",   group:"load"},
  {key:"loading",         label:"Начали загружать",          sub:"Идёт погрузка",                   icon:"⬆️", color:"#fb923c", bg:"#1a0f00", border:"#fb923c", status:"LOADING",   group:"load"},
  {key:"loaded",          label:"Загрузился",                sub:"Загрузка завершена, выезжаю",     icon:"✅", color:"#22c55e", bg:"#0a1a0a", border:"#22c55e", status:"LOADED",    group:"load"},

  // Выгрузка
  {key:"departing_unload",label:"Выехал на выгрузку",        sub:"Груз в машине, еду на точку",     icon:"🚚", color:"#a78bfa", bg:"#100a1f", border:"#a78bfa", status:"FORWARD",   group:"unload"},
  {key:"at_unload",       label:"Приехал на выгрузку",       sub:"На месте выгрузки",               icon:"📍", color:"#a78bfa", bg:"#100a1f", border:"#a78bfa", status:"AT_UNLOAD", group:"unload"},
  {key:"unloaded",        label:"Выгрузился",                 sub:"Выгрузка завершена",              icon:"✅", color:"#22c55e", bg:"#0a1a0a", border:"#22c55e", status:"UNLOADED",  group:"unload"},

  // Обратка
  {key:"departing_back",  label:"Выехал за обраткой",        sub:"Еду на точку загрузки обратки",   icon:"🔄", color:"#06b6d4", bg:"#001a1f", border:"#06b6d4", status:"BACK",      group:"back"},
  {key:"back_loaded",     label:"Загрузил обратный груз",     sub:"Обратка на борту, выезжаю",      icon:"📦", color:"#06b6d4", bg:"#001a1f", border:"#06b6d4", status:"BACK_LOADED",group:"back"},
  {key:"back_unloaded",   label:"Выгрузил обратный груз",     sub:"Обратка сдана, свободен",        icon:"🏁", color:"#22c55e", bg:"#0a1a0a", border:"#22c55e", status:"FREE",       group:"back"},

  // Проблема
  {key:"problem",         label:"Есть проблема!",             sub:"Авария, поломка, задержка",       icon:"🚨", color:"#ef4444", bg:"#1a0505", border:"#ef4444", status:"PROBLEM",   group:"problem"}
];

var GROUPS = {
  load:    {label:"Загрузка"},
  unload:  {label:"Выгрузка"},
  back:    {label:"Обратный груз"},
  problem: {label:"Проблемы"}
};

// ── Утилиты ───────────────────────────────────────────────────────────────────
function nowISO() {
  var d = new Date();
  var offset = 3 * 60; // MSK +3
  var utc = d.getTime() + d.getTimezoneOffset() * 60000;
  var msk = new Date(utc + offset * 60000);
  var pad = function(n) { return String(n).padStart(2,"0"); };
  return msk.getFullYear() + "-" + pad(msk.getMonth()+1) + "-" + pad(msk.getDate()) +
    "T" + pad(msk.getHours()) + ":" + pad(msk.getMinutes());
}
function fmtTime(iso) {
  if (!iso) return "";
  try {
    var d = new Date(iso);
    if (isNaN(d.getTime())) {
      // Попробуем как локальное
      var parts = iso.split("T");
      if (parts.length === 2) {
        return parts[1].slice(0,5);
      }
      return iso.slice(11,16) || "";
    }
    return String(d.getHours()).padStart(2,"0") + ":" + String(d.getMinutes()).padStart(2,"0");
  } catch(e) { return iso.slice(11,16) || ""; }
}
function fmtDT(iso) {
  if (!iso) return "";
  try {
    var t = fmtTime(iso);
    var d = iso.slice(8,10) + "." + iso.slice(5,7);
    return d + " " + t;
  } catch(e) { return iso; }
}
function getBtn(key) {
  for (var i = 0; i < BTNS.length; i++) { if (BTNS[i].key === key) return BTNS[i]; }
  return null;
}

// ── Состояние ─────────────────────────────────────────────────────────────────
var STATE = {
  truckId: null,
  truck: null,
  history: [],  // [{key, label, time, note}]
  lastStatus: null
};

function saveLocal() {
  try {
    localStorage.setItem("egida_driver_v2", JSON.stringify({
      truckId: STATE.truckId,
      history: STATE.history,
      lastStatus: STATE.lastStatus
    }));
  } catch(e) {}
}
function loadLocal() {
  try {
    var raw = localStorage.getItem("egida_driver_v2");
    if (!raw) return false;
    var d = JSON.parse(raw);
    if (!d || !d.truckId) return false;
    STATE.truckId = d.truckId;
    STATE.history = d.history || [];
    STATE.lastStatus = d.lastStatus || null;
    return true;
  } catch(e) { return false; }
}

// ── PIN экран ─────────────────────────────────────────────────────────────────
var pinDigits = [];

function buildNumpad() {
  var pad = document.getElementById("numpad");
  var nums = [1,2,3,4,5,6,7,8,9,"←",0,"✓"];
  pad.innerHTML = "";
  nums.forEach(function(n) {
    var btn = document.createElement("button");
    btn.className = "num-btn" + (n === "←" ? " del" : n === "✓" ? " ok" : "");
    btn.textContent = n;
    btn.addEventListener("click", function() {
      if (n === "←") {
        pinDigits.pop();
      } else if (n === "✓") {
        tryPin();
        return;
      } else {
        if (pinDigits.length < 4) pinDigits.push(n);
      }
      updatePinDisplay();
    });
    pad.appendChild(btn);
  });
}

function updatePinDisplay() {
  var el = document.getElementById("pin-display");
  if (pinDigits.length === 0) {
    el.textContent = "·  ·  ·  ·";
    el.style.color = "#334155";
  } else {
    var shown = "";
    for (var i = 0; i < 4; i++) {
      shown += (pinDigits[i] !== undefined ? "●" : "·");
      if (i < 3) shown += "  ";
    }
    el.textContent = shown;
    el.style.color = "#60a5fa";
  }
}

function showErr(msg) {
  document.getElementById("pin-err").textContent = msg;
}

function tryPin() {
  var pin = pinDigits.join("");
  if (pin.length < 4) { showErr("Введите 4 цифры"); return; }
  showErr("");
  document.getElementById("enter-btn").textContent = "Поиск...";
  document.getElementById("enter-btn").disabled = true;

  // Ищем сначала в /drivers (Firebase), потом в /app/trucks
  dbGet("/drivers").then(function(drivers) {
    var found = null;
    if (drivers && typeof drivers === "object") {
      var keys = Object.keys(drivers);
      for (var i = 0; i < keys.length; i++) {
        var d = drivers[keys[i]];
        if (d && String(d.pin) === pin) { found = d; break; }
      }
    }
    if (found) {
      onPinFound(found.id || found.truckId || keys[i]);
      return;
    }
    // Ищем в /app/trucks
    return dbGet("/app/trucks").then(function(trucks) {
      if (trucks && Array.isArray(trucks)) {
        for (var j = 0; j < trucks.length; j++) {
          if (trucks[j] && String(trucks[j].pin) === pin) {
            onPinFound(trucks[j].id);
            return;
          }
        }
      }
      showErr("Неверный код. Спросите у диспетчера.");
      document.getElementById("enter-btn").textContent = "Войти";
      document.getElementById("enter-btn").disabled = false;
      pinDigits = [];
      updatePinDisplay();
    });
  }).catch(function() {
    showErr("Нет связи. Проверьте интернет.");
    document.getElementById("enter-btn").textContent = "Войти";
    document.getElementById("enter-btn").disabled = false;
  });
}

function onPinFound(truckId) {
  STATE.truckId = Number(truckId) || truckId;
  // Загружаем данные машины
  dbGet("/app/trucks").then(function(trucks) {
    if (trucks && Array.isArray(trucks)) {
      for (var i = 0; i < trucks.length; i++) {
        var t = trucks[i];
        if (t && (t.id == STATE.truckId || String(t.id) === String(STATE.truckId))) {
          STATE.truck = t;
          break;
        }
      }
    }
    saveLocal();
    showDriver();
  }).catch(function() { saveLocal(); showDriver(); });
}

// ── Экран водителя ────────────────────────────────────────────────────────────
function showScreen(id) {
  ["screen-pin","screen-driver","screen-success"].forEach(function(s) {
    var el = document.getElementById(s);
    el.style.display = "none";
    el.classList.remove("active");
  });
  var target = document.getElementById(id);
  target.style.display = "flex";
  target.classList.add("active");
  window.scrollTo(0,0);
}

function showDriver() {
  var t = STATE.truck || {};
  document.getElementById("d-plate").textContent = t.plate || "Машина #" + STATE.truckId;
  document.getElementById("d-driver").textContent = t.driver || t.name || "";
  var hired = document.getElementById("d-hired");
  if (t.isHired && t.carrier) {
    hired.textContent = "Привлечённый · " + t.carrier;
    hired.style.display = "block";
  } else {
    hired.style.display = "none";
  }
  renderBtns();
  renderCurrentStatus();
  renderHistory(STATE.history, "history-list", "history-block");
  showScreen("screen-driver");
}

function renderCurrentStatus() {
  var last = STATE.lastStatus;
  var btn = last ? getBtn(last.key) : null;
  var label = btn ? btn.label : (last ? last.label : "Нет отметок сегодня");
  var color = btn ? btn.color : "#334155";
  var time = last ? last.time : "";

  var block = document.getElementById("cur-status-block");
  block.style.background = btn ? btn.bg : "#0a1020";
  block.style.border = "1px solid " + (btn ? btn.border + "60" : "#1e3060");
  document.getElementById("cur-dot").style.background = color;
  document.getElementById("cur-label").style.color = color;
  document.getElementById("cur-label").textContent = label;
  document.getElementById("cur-time").textContent = time ? ("Отмечено: " + fmtDT(time)) : "";
}

function renderBtns() {
  var area = document.getElementById("btn-area");
  area.innerHTML = "";
  var groups = {};
  BTNS.forEach(function(btn) {
    if (!groups[btn.group]) groups[btn.group] = [];
    groups[btn.group].push(btn);
  });
  var groupOrder = ["load","unload","back","problem"];
  groupOrder.forEach(function(gKey) {
    if (!groups[gKey]) return;
    var grpEl = document.createElement("div");
    grpEl.className = "btn-group";
    var gInfo = GROUPS[gKey] || {};
    var titleEl = document.createElement("div");
    titleEl.className = "group-title";
    titleEl.textContent = gInfo.label || gKey;
    grpEl.appendChild(titleEl);
    groups[gKey].forEach(function(btn) {
      var b = document.createElement("button");
      b.className = "status-btn";
      b.style.background = btn.bg;
      b.style.border = "1px solid " + btn.border + "60";
      b.style.color = btn.color;
      b.innerHTML =
        '<span class="btn-icon">' + btn.icon + '</span>' +
        '<span class="btn-text">' + btn.label +
          (btn.sub ? '<span class="btn-sub">' + btn.sub + '</span>' : '') +
        '</span>';
      b.addEventListener("click", function() { sendStatus(btn); });
      grpEl.appendChild(b);
    });
    area.appendChild(grpEl);
  });
}

function renderHistory(hist, listId, blockId) {
  var block = document.getElementById(blockId);
  var list = document.getElementById(listId);
  if (!hist || !hist.length) { block.style.display = "none"; return; }
  block.style.display = "block";
  list.innerHTML = "";
  var today = nowISO().slice(0,10);
  var todayItems = hist.filter(function(h) { return h.time && h.time.slice(0,10) === today; });
  if (!todayItems.length) { block.style.display = "none"; return; }
  var reversed = todayItems.slice().reverse().slice(0,8);
  reversed.forEach(function(h) {
    var btn = getBtn(h.key);
    var color = btn ? btn.color : "#94a3b8";
    var el = document.createElement("div");
    el.className = "history-item";
    el.innerHTML =
      '<div class="history-dot" style="background:' + color + '"></div>' +
      '<div class="history-label">' + (h.label || h.key) + (h.note ? ' · <em style="color:#475569">' + h.note + '</em>' : '') + '</div>' +
      '<div class="history-time">' + fmtTime(h.time) + '</div>';
    list.appendChild(el);
  });
}

// ── Отправка статуса ──────────────────────────────────────────────────────────
function sendStatus(btn) {
  var note = document.getElementById("comment-input").value.trim();
  var time = nowISO();
  var entry = { key: btn.key, label: btn.label, status: btn.status, time: time, note: note };

  // Добавляем в историю
  STATE.history.push(entry);
  STATE.lastStatus = entry;
  saveLocal();

  // Пишем в Firebase
  var truckId = STATE.truckId;
  var statusBody = {
    status: btn.status,
    lastEvent: btn.label,
    lastTime: time,
    note: note,
    key: btn.key
  };
  var eventBody = {
    key: btn.key,
    label: btn.label,
    time: time,
    note: note,
    status: btn.status
  };

  // Пишем в /status/<id> и /events/<id>/latest
  dbPatch("/status/" + truckId, statusBody);
  dbPatch("/events/" + truckId, { latest: eventBody });

  // Также пишем в /events/<id>/<timestamp> чтобы история не терялась
  dbPut("/events/" + truckId + "/" + time.replace(/[:.]/g,"_"), eventBody);

  // Показываем экран успеха
  var icon = btn.icon || "✅";
  document.getElementById("s-icon").textContent = icon;
  document.getElementById("s-label").textContent = btn.label;
  document.getElementById("s-time").textContent = "Время: " + fmtDT(time) + (note ? "\nКомментарий: " + note : "");
  var t = STATE.truck || {};
  document.getElementById("d-plate2").textContent = (t.plate || "#" + truckId) + (t.driver ? " · " + t.driver : "");
  document.getElementById("comment-input").value = "";
  renderHistory(STATE.history, "history-list2", "history-block2");
  showScreen("screen-success");
}

// ── Выход ─────────────────────────────────────────────────────────────────────
function logout() {
  STATE.truckId = null;
  STATE.truck = null;
  STATE.history = [];
  STATE.lastStatus = null;
  pinDigits = [];
  updatePinDisplay();
  try { localStorage.removeItem("egida_driver_v2"); } catch(e) {}
  document.getElementById("pin-err").textContent = "";
  document.getElementById("enter-btn").textContent = "Войти";
  document.getElementById("enter-btn").disabled = false;
  showScreen("screen-pin");
}

// ── Инициализация ─────────────────────────────────────────────────────────────
buildNumpad();
updatePinDisplay();

// Восстанавливаем сессию
if (loadLocal() && STATE.truckId) {
  // Догружаем данные машины если нет
  if (!STATE.truck) {
    dbGet("/app/trucks").then(function(trucks) {
      if (trucks && Array.isArray(trucks)) {
        for (var i = 0; i < trucks.length; i++) {
          if (trucks[i] && trucks[i].id == STATE.truckId) { STATE.truck = trucks[i]; break; }
        }
      }
      showDriver();
    }).catch(function() { showDriver(); });
  } else {
    showDriver();
  }
}

// Поддержка Enter на клавиатуре для PIN
document.addEventListener("keydown", function(e) {
  if (document.getElementById("screen-pin").classList.contains("active")) {
    if (e.key >= "0" && e.key <= "9" && pinDigits.length < 4) {
      pinDigits.push(parseInt(e.key));
      updatePinDisplay();
    } else if (e.key === "Backspace") {
      pinDigits.pop();
      updatePinDisplay();
    } else if (e.key === "Enter") {
      tryPin();
    }
  }
});
</script>
